name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Copy gares to public
        run: |
          mkdir -p public/gare-sorgenti/dettagli
          mkdir -p public/gare-sorgenti/gpx
          cp gare-sorgenti/dettagli/*.json public/gare-sorgenti/dettagli/ 2>/dev/null || true
          cp gare-sorgenti/gpx/*.json public/gare-sorgenti/gpx/ 2>/dev/null || true
          cp gare-sorgenti/*.json public/gare-sorgenti/ 2>/dev/null || true

      - name: Build (reports + Astro)
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
